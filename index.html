<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Romina's Tabata Simplu și Fără Reclame</title>
    <!-- Permite rularea ca aplicație web pe iOS și Android -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Iconițe personalizate cu versiune pentru cache -->
    <link class="apple-touch-icon" href="icon.png?v=9">
    <link rel="icon" type="image/png" href="icon.png?v=9" sizes="192x192">
    
    <!-- Conectare Google Fonts pentru fonturile Bebas Neue și Archivo (weight 100, 300, 400, 700) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@100;300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        /* Resetări globale */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #121212;
            overflow: hidden;
        }

        body { 
            text-align: center; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            color: white; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* Rezolvare nativă modernă pentru barele browserului */
        }

        h1 { 
            color: #e82d74; 
            font-size: 24px; 
            margin-top: 0;
            margin-bottom: 25px; 
            text-transform: uppercase;
            font-family: 'Archivo', sans-serif;
            font-weight: 300;
        }

        /* Pagina de Setări */
        #page-settings {
            padding: 20px; 
            width: 90%;
            max-width: 380px; 
            display: block;
        }

        .setting-field { 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .setting-field label { 
            font-family: 'Archivo', sans-serif;
            font-weight: 300; 
            font-size: 16px; 
            color: #ccc; 
            text-align: left; 
            padding-right: 10px; 
        }
        .setting-field input { 
            width: 80px; 
            padding: 12px 5px; 
            text-align: center; 
            font-size: 18px; 
            border-radius: 10px; 
            border: 1px solid #333; 
            background: #2a2a2a; 
            color: white; 
            font-family: 'Archivo', sans-serif;
            font-weight: 700; 
        }

        /* Pagina completă a Timerului - Optimizată dinamic */
        #page-timer { 
            display: none; 
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* Previne împingerea sub controalele browserului */
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 25px 20px 15px 20px; /* Padding ajustat pentru siguranță jos */
            background: #121212;
            transition: background 0.3s ease;
        }

        /* Containerul pentru Status (Stare + Subtitlu Pauză) */
        .status-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-height: 70px; 
        }

        #status { 
            font-family: 'Archivo', sans-serif;
            font-weight: 100; 
            font-size: 38px; 
            text-transform: uppercase; 
        }

        #sub-status {
            font-family: 'Archivo', sans-serif;
            font-weight: 300; 
            font-size: 18px;
            color: #ffffff;
            text-transform: uppercase;
            visibility: hidden; 
        }

        /* Partea de mijloc (Cronometrul uriaș în Bebas Neue) */
        .timer-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        #timer { 
            font-size: 46vw; 
            font-weight: normal; 
            color: #e82d74; 
            font-family: 'Bebas Neue', sans-serif;
            line-height: 0.9;
        }

        /* Zona de jos */
        .bottom-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px; /* Ridică ușor întregul grup de butoane */
        }

        /* Layout pe 3 coloane pentru statistici */
        .stats-row {
            width: 100%;
            margin-bottom: 20px;
            text-align: center;
        }

        .stat-box {
            display: inline-block;
            width: 32%;
            vertical-align: top;
            text-align: center;
        }

        .stat-label {
            font-family: 'Archivo', sans-serif;
            font-weight: 300; 
            font-size: 16px; /* Modificat la 16px */
            color: #aaa;
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px; 
        }

        .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 56px; /* Modificat la 56px */
            color: white;
            display: block;
            line-height: 1;
        }

        .buttons-row {
            display: flex;
            gap: 12px;
            width: 100%;
        }

        /* Butoane optimizate */
        button { 
            font-family: 'Archivo', sans-serif;
            font-weight: 300; 
            font-size: 18px; 
            padding: 16px 10px; 
            cursor: pointer; 
            border: none; 
            border-radius: 50px; 
            transition: transform 0.1s ease, background 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px; 
        }
        
        button:active {
            transform: scale(0.96);
        }

        .btn-start { 
            background: #e82d74; 
            color: white; 
            width: 100%; 
            font-weight: 400; 
            margin-top: 25px; 
        }
        
        .btn-pause, .btn-stop { 
            background: #1e1e1e; 
            color: white; 
            flex: 1; 
            width: 50%;
            transition: background 0.2s, color 0.2s, transform 0.1s ease; 
        }
        
        .btn-icon {
            width: 20px;
            height: 20px;
            fill: currentColor;
            flex-shrink: 0; 
        }
    </style>
</head>
<body>

    <!-- PAGINA DE SETĂRI -->
    <div id="page-settings">
        <h1>ROMINA'S<br/>TABATA SIMPLU ȘI FĂRĂ RECLAME</h1>
        
        <div class="setting-field">
            <label>Pregătire (secunde):</label>
            <input type="number" id="inputPregatire" value="7" min="0" inputmode="numeric">
        </div>
        <div class="setting-field">
            <label>Cicluri totale:</label>
            <input type="number" id="inputCicluri" value="4" min="1" inputmode="numeric">
        </div>
        <div class="setting-field">
            <label>Exerciții per ciclu:</label>
            <input type="number" id="inputRunde" value="10" min="1" inputmode="numeric">
        </div>
        <div class="setting-field">
            <label>Workout (secunde):</label>
            <input type="number" id="inputWorkout" value="30" min="5" inputmode="numeric">
        </div>
        <div class="setting-field">
            <label>Rest / Odihnă (sec):</label>
            <input type="number" id="inputRest" value="15" min="0" inputmode="numeric">
        </div>
        <div class="setting-field">
            <label>Recovery / Pauză Ciclu (sec):</label>
            <input type="number" id="inputRecovery" value="90" min="0" inputmode="numeric">
        </div>

        <button class="btn-start" onclick="comutaLaTimer()">
            <svg class="btn-icon" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z"/>
            </svg>
            <span>START ANTRENAMENT</span>
        </button>
    </div>

    <!-- PAGINA CU TIMERUL -->
    <div id="page-timer">
        <!-- Partea de Sus -->
        <div class="status-container">
            <div id="status">PREGĂTEȘTE-TE</div>
            <div id="sub-status">PAUZĂ</div>
        </div>
        
        <!-- Partea de Mijloc -->
        <div class="timer-container">
            <div id="timer">00:00</div>
        </div>
        
        <!-- Partea de Jos -->
        <div class="bottom-container">
            
            <!-- Layout pentru Statistici -->
            <div class="stats-row">
                <div class="stat-box">
                    <span class="stat-label">Ciclu</span>
                    <span id="stat-ciclu" class="stat-value">1/3</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Exercițiu</span>
                    <span id="stat-exercitiu" class="stat-value">1/4</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Timp Total</span>
                    <span id="stat-total" class="stat-value">00:00</span>
                </div>
            </div>
            
            <div class="buttons-row">
                <button id="btn-pauza" class="btn-pause" onclick="toglePauza()">
                    <svg class="btn-icon" viewBox="0 0 24 24" id="icon-pauza-stare">
                        <path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/>
                    </svg>
                    <span id="text-pauza">PAUZĂ</span>
                </button>
                <button id="btn-stop" class="btn-stop" onclick="opresteSiRevino()">
                    <svg class="btn-icon" viewBox="0 0 24 24" id="icon-stop-stare">
                        <path d="M6 6h12v12H6z"/>
                    </svg>
                    <span id="text-stop">STOP</span>
                </button>
            </div>
        </div>
    </div>

    <script>
        let timerInterval;
        let setari = {};
        
        let stareCurentă = ""; 
        let timpRamas = 0;
        let cicluCurent = 1;
        let rundaCurenta = 1;
        let esteInPauza = false;
        let timpTotalRamas = 0;
        let antrenamentTerminat = false;

        let audioCtx = null;
        let wakeLock = null;

        const SVG_PLAY = "M8 5v14l11-7z";
        const SVG_PAUSE = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";
        const SVG_STOP = "M6 6h12v12H6z";
        const SVG_SETTINGS = "M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z";

        function ajusteazaInaltimeEcran() {
            const inaltimeFereastra = window.innerHeight;
            const timerPage = document.getElementById("page-timer");
            if(timerPage) {
                timerPage.style.height = `${inaltimeFereastra}px`;
            }
        }
        window.addEventListener('resize', ajusteazaInaltimeEcran);
        window.addEventListener('orientationchange', ajusteazaInaltimeEcran);

        async function activeazaWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.log(`Eroare Wake Lock: ${err.message}`);
            }
        }

        function dezactiveazaWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        function redaSunet(frecventa = 800, ScriptDurata = 0.15) {
            try {
                if (!audioCtx) {
                    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (audioCtx.state === 'suspended') {
                    audioCtx.resume();
                }

                let oscillator = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();

                oscillator.type = 'sine'; 
                oscillator.frequency.value = frecventa;
                
                gainNode.gain.setValueAtTime(0.2, audioCtx.currentTime); 
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + ScriptDurata);

                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);

                oscillator.start();
                oscillator.stop(audioCtx.currentTime + ScriptDurata);
            } catch (e) {
                console.log("Sunetul nu a putut fi redat: ", e);
            }
        }

        function calculeazaTimpTotalInitial() {
            let total = setari.pregatire;
            for (let c = 1; c <= setari.cicluri; c++) {
                for (let r = 1; r <= setari.runde; r++) {
                    total += setari.workout;
                    if (r < setari.runde) total += setari.rest;
                }
                if (c < setari.cicluri) total += setari.recovery;
            }
            return total;
        }

        function comutaLaTimer() {
            ajusteazaInaltimeEcran();
            activeazaWakeLock();

            setari = {
                pregatire: parseInt(document.getElementById("inputPregatire").value) || 0,
                cicluri: parseInt(document.getElementById("inputCicluri").value),
                runde: parseInt(document.getElementById("inputRunde").value),
                workout: parseInt(document.getElementById("inputWorkout").value),
                rest: parseInt(document.getElementById("inputRest").value),
                recovery: parseInt(document.getElementById("inputRecovery").value)
            };

            timpTotalRamas = calculeazaTimpTotalInitial();

            document.getElementById("page-settings").style.display = "none";
            document.getElementById("page-timer").style.display = "flex";

            antrenamentTerminat = false;
            const btnPauza = document.getElementById("btn-pauza");
            const btnStop = document.getElementById("btn-stop");
            
            btnPauza.setAttribute("onclick", "toglePauza()");
            btnStop.setAttribute("onclick", "opresteSiRevino()");

            esteInPauza = false;
            
            document.getElementById("text-pauza").innerText = "PAUZĂ";
            document.getElementById("icon-pauza-stare").querySelector("path").setAttribute("d", SVG_PAUSE);
            btnPauza.style.background = "#1e1e1e";
            btnPauza.style.color = "white";
            
            document.getElementById("text-stop").innerText = "STOP";
            document.getElementById("icon-stop-stare").querySelector("path").setAttribute("d", SVG_STOP);
            btnStop.style.background = "#1e1e1e";
            btnStop.style.color = "white";

            document.getElementById("sub-status").style.visibility = "hidden";

            cicluCurent = 1;
            rundaCurenta = 1;

            if (setari.pregatire > 0) {
                pornesteStare("PREPARE", setari.pregatire);
            } else {
                pornesteStare("WORK", setari.workout);
            }
            
            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(ruleazaCronometru, 1000);
        }

        function toglePauza() {
            if (antrenamentTerminat) return;

            esteInPauza = !esteInPauza; 
            const btnPauza = document.getElementById("btn-pauza");
            const subStatusEl = document.getElementById("sub-status");
            const statusEl = document.getElementById("status");
            const iconPath = document.getElementById("icon-pauza-stare").querySelector("path");
            
            if (esteInPauza) {
                dezactiveazaWakeLock();
                document.getElementById("text-pauza").innerText = "REIA";
                iconPath.setAttribute("d", SVG_PLAY);
                
                if (stareCurentă === "WORK") {
                    btnPauza.style.background = "#e82d74"; 
                    btnPauza.style.color = "#ffffff";      
                } else if (stareCurentă === "REST") {
                    btnPauza.style.background = "#a6d100"; 
                    btnPauza.style.color = "#000000";      
                } else if (stareCurentă === "RECOVERY") {
                    btnPauza.style.background = "#3598db"; 
                    btnPauza.style.color = "#ffffff";      
                } else if (stareCurentă === "PREPARE") {
                    btnPauza.style.background = "#ffffff"; 
                    btnPauza.style.color = "#000000";      
                }
                
                subStatusEl.style.visibility = "visible";
            } else {
                activeazaWakeLock();
                document.getElementById("text-pauza").innerText = "PAUZĂ";
                iconPath.setAttribute("d", SVG_PAUSE);
                btnPauza.style.background = "#1e1e1e"; 
                btnPauza.style.color = "white"; 
                
                subStatusEl.style.visibility = "hidden";

                if (stareCurentă === "PREPARE") {
                    statusEl.innerText = "PREGĂTEȘTE-TE";
                    statusEl.style.color = "#ffffff";
                }
                if (stareCurentă === "WORK") {
                    statusEl.innerText = "EXERCISE";
                    statusEl.style.color = "#e82d74";
                }
                if (stareCurentă === "REST") {
                    statusEl.innerText = "REST";
                    statusEl.style.color = "#a6d100";
                }
                if (stareCurentă === "RECOVERY") {
                    statusEl.innerText = "RECOVERY";
                    statusEl.style.color = "#3598db";
                }
            }
        }

        function opresteSiRevino() {
            clearInterval(timerInterval);
            dezactiveazaWakeLock();
            document.getElementById("sub-status").style.visibility = "hidden";
            document.getElementById("page-timer").style.display = "none";
            document.getElementById("page-settings").style.display = "block";
            document.body.style.background = "#121212";
        }

        function pornesteStare(stare, timp) {
            stareCurentă = stare;
            timpRamas = timp;
            
            const statusEl = document.getElementById("status");
            const timerEl = document.getElementById("timer");
            const bodyEl = document.body;

            if (!esteInPauza) {
                if (stare === "PREPARE") {
                    statusEl.innerText = "PREGĂTEȘTE-TE";
                    statusEl.style.color = "#ffffff";
                    timerEl.style.color = "#ffffff";
                    bodyEl.style.background = "#121212";
                } else if (stare === "WORK") {
                    statusEl.innerText = "EXERCISE";
                    statusEl.style.color = "#e82d74";
                    timerEl.style.color = "#e82d74";
                    bodyEl.style.background = "#121212";
                } else if (stare === "REST") {
                    statusEl.innerText = "REST";
                    statusEl.style.color = "#a6d100";
                    timerEl.style.color = "#a6d100";
                    bodyEl.style.background = "#131610";
                } else if (stare === "RECOVERY") {
                    statusEl.innerText = "RECOVERY";
                    statusEl.style.color = "#3598db";
                    timerEl.style.color = "#3598db";
                    bodyEl.style.background = "#101316";
                }
            }

            actualizeazaInterfata();
        }

        function ruleazaCronometru() {
            if (esteInPauza) return; 

            if (timpTotalRamas > 0) {
                timpTotalRamas--;
            }

            if (timpRamas > 1) {
                timpRamas--;
                actualizeazaInterfata();
                
                if (timpRamas <= 3) {
                    redaSunet(1200, 0.1);
                }
            } else {
                redaSunet(1800, 0.4); 
                schimbaStarea();
            }
        }

        function schimbaStarea() {
            if (stareCurentă === "PREPARE") {
                pornesteStare("WORK", setari.workout);
            }
            else if (stareCurentă === "WORK") {
                if (rundaCurenta < setari.runde) {
                    pornesteStare("REST", setari.rest);
                } else {
                    if (cicluCurent < setari.cicluri) {
                        pornesteStare("RECOVERY", setari.recovery);
                    } else {
                        terminaAntrenament();
                    }
                }
            } 
            else if (stareCurentă === "REST") {
                rundaCurenta++;
                pornesteStare("WORK", setari.workout);
            } 
            else if (stareCurentă === "RECOVERY") {
                cicluCurent++;
                rundaCurenta = 1;
                pornesteStare("WORK", setari.workout);
            }
        }

        function actualizeazaInterfata() {
            let minute = Math.floor(timpRamas / 60);
            let secunde = timpRamas % 60;
            let formatMinute = minute < 10 ? "0" + minute : minute;
            let formatSecunde = secunde < 10 ? "0" + secunde : secunde;
            document.getElementById("timer").innerText = `${formatMinute}:${formatSecunde}`;
            
            let tMinute = Math.floor(timpTotalRamas / 60);
            let tSecunde = timpTotalRamas % 60;
            let formatTMinute = tMinute < 10 ? "0" + tMinute : tMinute;
            let formatTSecunde = tSecunde < 10 ? "0" + tSecunde : tSecunde;
            document.getElementById("stat-total").innerText = `${formatTMinute}:${formatTSecunde}`;

            document.getElementById("stat-ciclu").innerText = `${cicluCurent}/${setari.cicluri}`;
            document.getElementById("stat-exercitiu").innerText = `${rundaCurenta}/${setari.runde}`;
        }

        function terminaAntrenament() {
            clearInterval(timerInterval);
            dezactiveazaWakeLock();
            
            redaSunet(1800, 1);

            antrenamentTerminat = true;
            timpTotalRamas = 0;
            document.getElementById("stat-total").innerText = "00:00";
            
            document.getElementById("status").innerText = "VICTORIE!";
            document.getElementById("status").style.color = "#ffffff";
            document.getElementById("sub-status").style.visibility = "hidden";
            
            document.getElementById("timer").innerText = "00:00";
            document.getElementById("timer").style.color = "#ffffff";
            document.body.style.background = "#121212";

            const btnPauza = document.getElementById("btn-pauza");
            const btnStop = document.getElementById("btn-stop");

            document.getElementById("text-pauza").innerText = "RESTART";
            document.getElementById("icon-pauza-stare").querySelector("path").setAttribute("d", SVG_PLAY);
            btnPauza.setAttribute("onclick", "comutaLaTimer()");
            btnPauza.style.background = "#e82d74"; 
            btnPauza.style.color = "#ffffff";

            document.getElementById("text-stop").innerText = "SETĂRI";
            document.getElementById("icon-stop-stare").querySelector("path").setAttribute("d", SVG_SETTINGS);
            btnStop.setAttribute("onclick", "opresteSiRevino()");
            btnStop.style.background = "#1e1e1e";
            btnStop.style.color = "#ffffff";
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && !esteInPauza && stareCurentă !== "") {
                await activeazaWakeLock();
            }
        });
    </script>
</body>
</html>
