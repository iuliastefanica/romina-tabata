<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Romina's Basic Interval Timer Fără Reclame</title>
    <!-- Permite rularea ca aplicație web pe iOS și Android -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    
    <!-- Iconițe personalizate cu versiune pentru cache -->
    <link class="apple-touch-icon" href="icon.png?v=9">
    <link rel="icon" type="image/png" href="icon.png?v=9" sizes="192x192">
    
    <!-- Conectare Google Fonts pentru fonturile Bebas Neue și Archivo (weight 100, 300, 400, 700) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Archivo:wght@100;300;400;700&family=Bebas+Neue&display=swap" rel="stylesheet">
    
    <style>
        /* Resetări globale */
        * {
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
            touch-action: manipulation;
        }

        html, body {
            height: 100%;
            margin: 0;
            padding: 0;
            background: #121212;
            overflow: hidden;
        }

        body { 
            text-align: center; 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; 
            color: white; 
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            min-height: 100dvh; /* Rezolvare nativă modernă pentru barele browserului */
        }

        h1 { 
            color: #e82d74; 
            font-size: 24px; 
            margin-top: 0;
            margin-bottom: 25px; 
            text-transform: uppercase;
            font-family: 'Archivo', sans-serif;
            font-weight: 700;
        }

        /* Pagina de Setări */
        #page-settings {
            padding: 20px; 
            width: 90%;
            max-width: 380px; 
            display: block;
        }

        .setting-field { 
            margin-bottom: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
        }
        .setting-field label { 
            font-family: 'Archivo', sans-serif;
            font-weight: 300; 
            font-size: 16px; 
            color: #ccc; 
            text-align: left; 
            padding-right: 10px; 
        }
        .setting-field input { 
            width: 80px; 
            padding: 12px 5px; 
            text-align: center; 
            font-size: 18px; 
            border-radius: 10px; 
            border: 1px solid #333; 
            background: #2a2a2a; 
            color: white; 
            font-family: 'Archivo', sans-serif;
            font-weight: 700; 
        }

        /* Pagina completă a Timerului - Optimizată dinamic */
        #page-timer { 
            display: none; 
            width: 100vw;
            height: 100vh;
            height: 100dvh; /* Previne împingerea sub controalele browserului */
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 25px 20px 15px 20px; /* Padding ajustat pentru siguranță jos */
            background: #121212;
            transition: background 0.3s ease;
        }

        /* Containerul pentru Status (Stare + Subtitlu Pauză) */
        .status-container {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            min-height: 70px; 
        }

        #status { 
            font-family: 'Archivo', sans-serif;
            font-weight: 300; 
            font-size: 38px; 
            text-transform: uppercase; 
        }

        #sub-status {
            font-family: 'Archivo', sans-serif;
            font-weight: 300; 
            font-size: 18px;
            color: #ffffff;
            text-transform: uppercase;
            visibility: hidden; 
        }

        /* Partea de mijloc (Cronometrul uriaș în Bebas Neue) */
        .timer-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }
        #timer { 
            font-size: 46vw; 
            font-weight: normal; 
            color: #e82d74; 
            font-family: 'Bebas Neue', sans-serif;
            line-height: 0.9;
        }

        /* Zona de jos */
        .bottom-container {
            width: 100%;
            max-width: 400px;
            margin-bottom: 10px; /* Ridică ușor întregul grup de butoane */
        }

        /* Layout pe 3 coloane pentru statistici */
        .stats-row {
            width: 100%;
            margin-bottom: 20px;
            text-align: center;
        }

        .stat-box {
            display: inline-block;
            width: 32%;
            vertical-align: top;
            text-align: center;
        }

        .stat-label {
            font-family: 'Archivo', sans-serif;
            font-weight: 300; 
            font-size: 16px; /* Modificat la 16px */
            color: #aaa;
            text-transform: uppercase;
            display: block;
            margin-bottom: 8px; 
        }

        .stat-value {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 56px; /* Modificat la 56px */
            color: white;
            display: block;
            line-height: 1;
        }

        .buttons-row {
			display: flex;
			gap: 8px;
			width: 100%;
		}

		.btn-control {
			background: rgb(40, 40, 40);
			color: white;
			flex: 1;
			padding: 16px 10px;
			border-radius: 50px;
			transition: transform 0.1s ease, background 0.2s;
			display: flex;
			align-items: center;
			justify-content: center;
		}

		.btn-icon {
			width: 24px;
			height: 24px;
			fill: currentColor;
		}

        /* Butoane optimizate */
        button { 
            font-family: 'Archivo', sans-serif;
            font-weight: 300; 
            font-size: 18px; 
            padding: 16px 10px; 
            cursor: pointer; 
            border: none; 
            border-radius: 50px; 
            transition: transform 0.1s ease, background 0.2s;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px; 
        }
        
        button:active {
            transform: scale(0.96);
        }

        .btn-start { 
            background: #e82d74; 
            color: white; 
            width: 100%; 
            font-weight: 400; 
            margin-top: 25px; 
        }
        
        .btn-pause, .btn-stop { 
            background: rgb(40, 40, 40); 
            color: white; 
            flex: 1; 
            width: 50%;
            transition: background 0.2s, color 0.2s, transform 0.1s ease; 
        }
        
        .btn-icon {
            fill: currentColor;
            flex-shrink: 0; 
        }
		
		@keyframes blink {
			0% { opacity: 1; }
			50% { opacity: 0.1; }
			100% { opacity: 1; }
		}

		/* Clasa aplicata cand este in pauza */
		.blink-icon {
			animation: blink 1s infinite;
		}

		/* Stil pentru SVG-ul din sub-status */
		#sub-status svg {
			width: 28px;
			height: 28px;
			fill: #ffffff;
			display: block;
		}
    </style>
</head>
<body>

    <!-- Elemente Audio -->
    <audio id="audioBip" src="sunete/bip.mp3" preload="auto"></audio>
    <audio id="audioVocal" preload="auto"></audio>

    <!-- PAGINA DE SETĂRI -->
    <div id="page-settings">
		<img src="tabata-romina-logo.svg" alt="Logo" style="width: 50px; max-width: 200px; margin-bottom: 20px;">
        <h1>ROMINA'S<br/>BASIC INTERVAL TIMER<br/>FĂRĂ RECLAME</h1>
        
        <div class="setting-field">
            <label>Pregătire (secunde):</label>
            <input type="number" id="inputPregatire" value="7" min="0" inputmode="numeric">
        </div>
        <div class="setting-field">

        <div class="setting-field">

		<div class="setting-field">
			<label>Voce:</label>
			<select id="selectVoce" style="width: 80px; padding: 12px 5px; text-align: center; font-size: 16px; border-radius: 10px; border: 1px solid #333; background: #2a2a2a; color: white; font-family: 'Archivo', sans-serif;">
				<option value="romana">Ro</option>
				<option value="engleza">Eng</option>

        <button id="btn-start" class="btn-start" onclick="comutaLaTimer(this.id)">
            <svg class="btn-icon" viewBox="0 0 24 24">
                <path d="M8 5v14l11-7z"/>

        </button>

    <!-- PAGINA CU TIMERUL -->
    <div id="page-timer">
        <!-- Partea de Sus -->
        <div class="status-container">
            <div id="status">PREGĂTEȘTE-TE</div>
            <div id="sub-status">
				<svg viewBox="0 0 24 24"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
			</div>
        </div>
        
        <!-- Partea de Mijloc -->
        <div class="timer-container">
            <div id="timer">00:00</div>
        </div>
        
        <!-- Partea de Jos -->
        <div class="bottom-container">
            
            <!-- Layout pentru Statistici -->
            <div class="stats-row">
                <div class="stat-box">
                    <span class="stat-label">Ciclu</span>
                    <span id="stat-ciclu" class="stat-value">1/3</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Exercițiu</span>
                    <span id="stat-exercitiu" class="stat-value">1/4</span>
                </div>
                <div class="stat-box">
                    <span class="stat-label">Timp Total</span>
                    <span id="stat-total" class="stat-value">00:00</span>
                </div>
            </div>
            
            <div class="buttons-row">
				<button id="btn-pauza" class="btn-pause" onclick="toglePauza()">
					<svg class="btn-icon" viewBox="0 0 24 24" id="icon-pauza-stare"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
				</button>
				<button id="btn-back" class="btn-control" onclick="backStare()">
					<svg class="btn-icon" viewBox="0 0 24 24" style="transform: scaleX(-1);"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
				</button>

				<button id="btn-stop" class="btn-stop" onclick="opresteSiRevino()">
					<svg class="btn-icon" viewBox="0 0 24 24" id="icon-stop-stare"><path d="M6 6h12v12H6z"/></svg>
				</button>

    </div>

    <script>
        let timerInterval;
        let setari = {};
        
        let stareCurentă = ""; 
        let timpRamas = 0;
        let cicluCurent = 1;
        let rundaCurenta = 1;
        let esteInPauza = false;
        let timpTotalRamas = 0;
        let antrenamentTerminat = false;
		let indexCurent = 0; // Pornește de la prima stare (index 0)

        let wakeLock = null;
		
		let limbaSelectata = "romana";
		
		let planAntrenament = [];

        const SVG_PLAY = "M8 5v14l11-7z";
        const SVG_PAUSE = "M6 19h4V5H6v14zm8-14v14h4V5h-4z";
        const SVG_STOP = "M6 6h12v12H6z";
        const SVG_SETTINGS = "M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z";
		const SVG_REPLAY = "M17.65 6.35C16.2 4.9 14.21 4 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08c-.82 2.33-3.04 4-5.65 4-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z";
		
		const texteTraduse = {
			romana: {
				PREPARE: "Pregătește-te",
				WORK: "Începem",
				REST: "Pauză",
				RECOVERY: "Repaus",
				FINISHED: "Bravo!"
			},
			engleza: {
				PREPARE: "Get ready",
				WORK: "Exercise",
				REST: "Rest",
				RECOVERY: "Recovery",
				FINISHED: "Good job!"
			}
		};
		
		const durate = { 
				"WORK": setari.workout, 
				"REST": setari.rest, 
				"RECOVERY": setari.recovery, 
				"PREPARE": setari.pregatire 
		};
		
		function genereazaPlanAntrenament() {			
			// Calculăm durata totală pentru a porni de la ea în jos
			let timpTotalRamas = calculeazaTimpTotalInitial();
			if (planAntrenament) {
				planAntrenament.length = 0;
			}
			// 1. PREPARE
			if (setari.pregatire > 0) {
				planAntrenament.push({ stare: "PREPARE", runda: 1, ciclu: 1, durata: setari.pregatire, startTime: timpTotalRamas });
				timpTotalRamas -= setari.pregatire;
			}

			for (let c = 1; c <= setari.cicluri; c++) {
				for (let r = 1; r <= setari.runde; r++) {
					
					// 2. WORK
					planAntrenament.push({ stare: "WORK", runda: r, ciclu: c, durata: setari.workout, startTime: timpTotalRamas });
					timpTotalRamas -= setari.workout;

					// 3. REST (dacă nu e ultima rundă din ultimul ciclu)
					if (!(r === setari.runde && c === setari.cicluri)) {
						planAntrenament.push({ stare: "REST", runda: r, ciclu: c, durata: setari.rest, startTime: timpTotalRamas });
						timpTotalRamas -= setari.rest;
					}
				}

				// 4. RECOVERY (între cicluri)
				if (c < setari.cicluri) {
					planAntrenament.push({ stare: "RECOVERY", runda: setari.runde, ciclu: c, durata: setari.recovery, startTime: timpTotalRamas });
					timpTotalRamas -= setari.recovery;
				}
			}
		}
		
		function actualizeazaStareCurenta() {
			// Aplică acele valori variabilelor tale globale
			// Acestea sunt variabilele pe care le citește cronometrul și interfața ta
			stareCurentă = planAntrenament[indexCurent].stare;
			rundaCurenta = planAntrenament[indexCurent].runda;
			cicluCurent = planAntrenament[indexCurent].ciclu;
			timpTotalRamas = planAntrenament[indexCurent].startTime;
		}

		function backStare() {
			// Verificăm dacă nu suntem deja la prima stare (index 0)
			if (indexCurent > 0) {
			console.log("Index curent", indexCurent);
				// 1. Scădem indexul pentru a ne întoarce la starea anterioară
				indexCurent--;
			} else {
				indexCurent = 0;
			}
			// 2. Sincronizăm toate variabilele globale cu noua stare din istoric
			actualizeazaStareCurenta();
				
			// 3. Pornim cronometrul la noua stare
			pornesteStare(planAntrenament[indexCurent].stare, planAntrenament[indexCurent].durata);
		}

		function skipStare() {
			timpRamas = 1;
			schimbaStarea();
			// 2. Sincronizăm toate variabilele globale cu noua stare din istoric
			actualizeazaStareCurenta();
		}
		

        function redaSunetVocal(fisierNume) {
			// Preluăm limba selectată
			limbaSelectata = document.getElementById("selectVoce").value;
			const audio = document.getElementById("audioVocal");
			
			// Construim calea: sunete/romana/nume.mp3 sau sunete/engleza/nume.mp3
			audio.src = `sunete/${limbaSelectata}/${fisierNume}`;
			audio.play();
		}

        function ajusteazaInaltimeEcran() {
            const inaltimeFereastra = window.innerHeight;
            const timerPage = document.getElementById("page-timer");
            if(timerPage) {
                timerPage.style.height = `${inaltimeFereastra}px`;
            }
        }
        window.addEventListener('resize', ajusteazaInaltimeEcran);
        window.addEventListener('orientationchange', ajusteazaInaltimeEcran);

        async function activeazaWakeLock() {
            try {
                if ('wakeLock' in navigator) {
                    wakeLock = await navigator.wakeLock.request('screen');
                }
            } catch (err) {
                console.log(`Eroare Wake Lock: ${err.message}`);
            }
        }

        function dezactiveazaWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }

		function calculeazaTimpTotalInitial() {
			let total = setari.pregatire;
			for (let c = 1; c <= setari.cicluri; c++) {
				for (let r = 1; r <= setari.runde; r++) {
					total += setari.workout;
					// Adăugăm REST după fiecare rundă
					total += setari.rest;
				}
				// După ce am adăugat REST la toate rundele, 
				// adăugăm RECOVERY doar dacă nu este ultimul ciclu
				if (c < setari.cicluri) {
					total += setari.recovery;
				}
			}
			// Deoarece am adăugat un REST în plus la finalul ultimului ciclu, îl scădem:
			total -= setari.rest;
			
			return total;
		}
		
		function calculeazaStartTime(stare, ciclu, runda) {
			let durataUnuiCicluComplet = (setari.workout * setari.runde) + (setari.rest * setari.runde);
			let durataTotala = (setari.cicluri * durataUnuiCicluComplet) + ((setari.cicluri - 1) * setari.recovery) - setari.rest + setari.pregatire;
			if (stare === "PREPARE") return durataTotala;
			
			let totalScurs = 0;

			// 2. Calculăm timpul consumat în ciclurile complete ANTERIOARE
			let cicluriAnterioare = ciclu - 1;
			totalScurs += cicluriAnterioare * (durataUnuiCicluComplet + setari.recovery);

			// 3. Calculăm timpul consumat în rundele complete ANTERIOARE din ciclul curent
			let rundeAnterioareInCiclu = runda - 1;
			totalScurs += rundeAnterioareInCiclu * (setari.workout + setari.rest);

			// 4. Adăugăm timpul consumat în cadrul rundei curente, PÂNĂ la starea cerută
			// Ordinea standard: PREPARE -> WORK -> REST
			if (stare === "WORK") {
				totalScurs += setari.pregatire;
			} else if (stare === "REST") {
				totalScurs += setari.pregatire + setari.workout;
			}
			// Dacă e RECOVERY, stăm la finalul rundelor, deci e deja calculat la punctul 2

			// 5. startTime-ul nostru este timpul total al antrenamentului MINUS timpul scurs până la ea
			// (sau poți returna direct 'totalScurs' dacă vrei timpul de la începutul antrenamentului)
			
			// Calculăm durata totală a antrenamentului
			let startTime = durataTotala - totalScurs;
			
			return startTime;
		}

        function comutaLaTimer(idButon) {
            ajusteazaInaltimeEcran();
            activeazaWakeLock();
            
			if (idButon === "btn-start" || idButon === "btn-stop") {
				
					setari = {
						pregatire: parseInt(document.getElementById("inputPregatire").value) || 0,
						cicluri: parseInt(document.getElementById("inputCicluri").value) || 4,
						runde: parseInt(document.getElementById("inputRunde").value) || 10,
						workout: parseInt(document.getElementById("inputWorkout").value) || 30,
						rest: parseInt(document.getElementById("inputRest").value) || 15,
						recovery: parseInt(document.getElementById("inputRecovery").value) || 90
					};

					timpTotalRamas = calculeazaTimpTotalInitial();
					
					// 2. Afișăm în consolă să vedem dacă sunt valorile corecte
					console.log("--- Setări preluate din input-uri ---");
					console.table(setari); // console.table afișează datele foarte frumos sub formă de tabel
					planAntrenament.length = 0;
					
					genereazaPlanAntrenament();
					
			} 
			
			
			indexCurent = 0;
			actualizeazaStareCurenta();
			
            document.getElementById("page-settings").style.display = "none";
            document.getElementById("page-timer").style.display = "flex";

            antrenamentTerminat = false;
            const btnPauza = document.getElementById("btn-pauza");
            const btnStop = document.getElementById("btn-stop");
            
            btnPauza.setAttribute("onclick", "toglePauza()");
            btnStop.setAttribute("onclick", "opresteSiRevino()");
			
			document.getElementById("btn-skip").style.display = "flex";
			document.getElementById("btn-back").style.display = "flex";

            esteInPauza = false;
            
           // document.getElementById("text-pauza").innerText = "PAUZĂ";
            document.getElementById("icon-pauza-stare").querySelector("path").setAttribute("d", SVG_PAUSE);
            btnPauza.style.background = "rgb(40, 40, 40)";
            btnPauza.style.color = "white";
            
           // document.getElementById("text-stop").innerText = "STOP";
            document.getElementById("icon-stop-stare").querySelector("path").setAttribute("d", SVG_STOP);
            btnStop.style.background = "rgb(40, 40, 40)";
            btnStop.style.color = "white";

            document.getElementById("sub-status").style.visibility = "hidden";

			stareCurenta = planAntrenament[indexCurent];
			pornesteStare(stareCurenta.stare, stareCurenta.durata);
			
			document.getElementById("sub-status").style.visibility = "hidden";
			document.getElementById("sub-status").classList.remove("blink-icon");

            if(timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(ruleazaCronometru, 1000);
        }

		function actualizeazaTextStare(stare) {
			const limba = document.getElementById("selectVoce").value;
			const elementTitlu = document.getElementById("titluStare"); // Asigură-te că acesta este ID-ul corect
			
			// Verificăm dacă starea există în obiectul de traduceri
			if (texteTraduse[limba][stare]) {
				elementTitlu.innerText = texteTraduse[limba][stare];
			}
		}

        function toglePauza() {
			if (antrenamentTerminat) return;

			esteInPauza = !esteInPauza; 
			const btnPauza = document.getElementById("btn-pauza");
			const subStatusEl = document.getElementById("sub-status");
			const statusEl = document.getElementById("status");
			const iconPath = document.getElementById("icon-pauza-stare").querySelector("path");
			const limba = document.getElementById("selectVoce").value;
			
			if (esteInPauza) {
				dezactiveazaWakeLock();
				iconPath.setAttribute("d", SVG_PLAY);
				
				if (stareCurentă === "WORK") {
					btnPauza.style.background = "#e82d74"; 
					btnPauza.style.color = "#ffffff";      
				} else if (stareCurentă === "REST") {
					btnPauza.style.background = "#a6d100"; 
					btnPauza.style.color = "#000000";      
				} else if (stareCurentă === "RECOVERY") {
					btnPauza.style.background = "#3598db"; 
					btnPauza.style.color = "#ffffff";      
				} else if (stareCurentă === "PREPARE") {
					btnPauza.style.background = "#ffffff"; 
					btnPauza.style.color = "#000000";      
				}
				
				// Afișăm SVG-ul de sus și îi dăm clasa de clipocire
				subStatusEl.style.visibility = "visible";
				subStatusEl.classList.add("blink-icon");
			} else {
				activeazaWakeLock();
				iconPath.setAttribute("d", SVG_PAUSE);
				btnPauza.style.background = "rgb(40, 40, 40)"; 
				btnPauza.style.color = "white"; 
				
				// Ascundem SVG-ul și oprim animația
				subStatusEl.style.visibility = "hidden";
				subStatusEl.classList.remove("blink-icon");

				if (stareCurentă === "PREPARE") {
					statusEl.innerText = texteTraduse[limba].PREPARE;
					statusEl.style.color = "#ffffff";
				}
				if (stareCurentă === "WORK") {
					statusEl.innerText = texteTraduse[limba].WORK;
					statusEl.style.color = "#e82d74";
				}
				if (stareCurentă === "REST") {
					statusEl.innerText = texteTraduse[limba].REST;
					statusEl.style.color = "#a6d100";
				}
				if (stareCurentă === "RECOVERY") {
					statusEl.innerText = texteTraduse[limba].RECOVERY;
					statusEl.style.color = "#3598db";
				}
			}
		}

        function opresteSiRevino() {
            clearInterval(timerInterval);
            dezactiveazaWakeLock();
            document.getElementById("sub-status").style.visibility = "hidden";
            document.getElementById("page-timer").style.display = "none";
            document.getElementById("page-settings").style.display = "block";
            document.body.style.background = "#121212";
        }

        function pornesteStare(stare, timp) {
            stareCurentă = stare;
            timpRamas = timp;
            
			const limba = document.getElementById("selectVoce").value;
            const statusEl = document.getElementById("status");
            const timerEl = document.getElementById("timer");
            const bodyEl = document.body;

            if (!esteInPauza) {
                if (stare === "PREPARE") {
                    statusEl.innerText = texteTraduse[limba].PREPARE;
                    statusEl.style.color = "#ffffff";
                    timerEl.style.color = "#ffffff";
                    bodyEl.style.background = "#121212";
                    redaSunetVocal("getready.mp3");
                } else if (stare === "WORK") {
                    statusEl.innerText = texteTraduse[limba].WORK;
                    statusEl.style.color = "#e82d74";
                    timerEl.style.color = "#e82d74";
                    bodyEl.style.background = "#121212";
                    redaSunetVocal("exercise.mp3");
                } else if (stare === "REST") {
                    statusEl.innerText = texteTraduse[limba].REST;
                    statusEl.style.color = "#a6d100";
                    timerEl.style.color = "#a6d100";
                    bodyEl.style.background = "#131610";
                    redaSunetVocal("rest.mp3");
                } else if (stare === "RECOVERY") {
                    statusEl.innerText = texteTraduse[limba].RECOVERY;
                    statusEl.style.color = "#3598db";
                    timerEl.style.color = "#3598db";
                    bodyEl.style.background = "#101316";
                    redaSunetVocal("recovery.mp3");
                }
            }

            actualizeazaInterfata();
        }

        function ruleazaCronometru() {
            if (esteInPauza) return; 

            if (timpTotalRamas > 0) {
                timpTotalRamas--;
            }

            if (timpRamas > 1) {
                timpRamas--;
                actualizeazaInterfata();
                
                if (timpRamas <= 3) {
                    const audio = document.getElementById("audioBip");
                    audio.currentTime = 0;
                    audio.play();
                }
            } else {
                schimbaStarea();
            }
        }

		function schimbaStarea() {
			if (indexCurent >= 0) {
				if (indexCurent == planAntrenament.length - 1) {
					terminaAntrenament();
				} else {
					indexCurent++;
					/*stareCurenta = planAntrenament[indexCurent];
					cicluCurent = stareCurenta.ciclu;
					rundaCurenta = stareCurenta.runda;
					*/
					actualizeazaStareCurenta();
					console.log("--- Index curent: ---", indexCurent);
					console.log("--- Stare noua: ---", stareCurenta.stare);
					console.log("--- Durata stare noua: ---", stareCurenta.durata);
					pornesteStare(planAntrenament[indexCurent].stare, planAntrenament[indexCurent].durata);
				}
			}
		}

        function actualizeazaInterfata() {
            let minute = Math.floor(timpRamas / 60);
            let secunde = timpRamas % 60;
            let formatMinute = minute < 10 ? "0" + minute : minute;
            let formatSecunde = secunde < 10 ? "0" + secunde : secunde;
            document.getElementById("timer").innerText = `${formatMinute}:${formatSecunde}`;
            
            let tMinute = Math.floor(timpTotalRamas / 60);
            let tSecunde = timpTotalRamas % 60;
            let formatTMinute = tMinute < 10 ? "0" + tMinute : tMinute;
            let formatTSecunde = tSecunde < 10 ? "0" + tSecunde : tSecunde;
            document.getElementById("stat-total").innerText = `${formatTMinute}:${formatTSecunde}`;

            document.getElementById("stat-ciclu").innerText = `${cicluCurent}/${setari.cicluri}`;
            document.getElementById("stat-exercitiu").innerText = `${rundaCurenta}/${setari.runde}`;
        }

        function terminaAntrenament() {
            clearInterval(timerInterval);
            dezactiveazaWakeLock();
			const limba = document.getElementById("selectVoce").value;
            
            redaSunetVocal("bravo.mp3");

            antrenamentTerminat = true;
            timpTotalRamas = 0;
			timpRamas = 0;
            document.getElementById("stat-total").innerText = "00:00";
            
			document.getElementById("status").innerText = texteTraduse[limba].FINISHED;
            document.getElementById("status").style.color = "#ffffff";
            document.getElementById("sub-status").style.visibility = "hidden";
            
            document.getElementById("timer").innerText = "00:00";
            document.getElementById("timer").style.color = "#ffffff";
            document.body.style.background = "#121212";

            const btnPauza = document.getElementById("btn-pauza");
            const btnStop = document.getElementById("btn-stop");

           // document.getElementById("text-pauza").innerText = "RESTART";
            document.getElementById("icon-pauza-stare").querySelector("path").setAttribute("d", SVG_REPLAY);
            btnPauza.setAttribute("onclick", "comutaLaTimer('btn-pauza')");
            btnPauza.style.background = "#e82d74"; 
            btnPauza.style.color = "#ffffff";

           // document.getElementById("text-stop").innerText = "SETĂRI";
            document.getElementById("icon-stop-stare").querySelector("path").setAttribute("d", SVG_SETTINGS);
            btnStop.setAttribute("onclick", "opresteSiRevino()");
            btnStop.style.background = "rgb(40, 40, 40)";
            btnStop.style.color = "#ffffff";
			
			document.getElementById("btn-skip").style.display = "none";
			document.getElementById("btn-back").style.display = "none";
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && !esteInPauza && stareCurentă !== "") {
                await activeazaWakeLock();
            }
        });
    </script>
</body>
</html>
